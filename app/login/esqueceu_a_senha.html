<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Sistema Voluntários</title>
    <link rel="stylesheet" href="/app/login/esqueceu_a_senha.css">
</head>
<body>

<div class="recovery-card">
    <h2>Esqueceu sua senha?</h2>
    <p class="subtitle">
        Informe seu e-mail e enviaremos um link para redefinição da senha.
    </p>

    <form action="#" method="POST">
        <div class="form-group">
            <label for="email">E-mail</label>
            <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="ana.souza@email.com">
        </div>

        <button type="submit" class="btn-submit">
            Enviar Link de Recuperação
        </button>
    </form>

    <div class="card-footer">
        <p>
            Lembrou sua senha?
            <a href="login_pi.html">Voltar ao Login</a>
        </p>
    </div>
</div>

</body>
</html>

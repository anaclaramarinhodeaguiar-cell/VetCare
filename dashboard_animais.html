<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animais - VetCare</title>
    <link rel="stylesheet" href="dashboard_animais.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <h2>VetCare</h2>
        <ul>
           
<li><a class="sidebar-link" href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>

<li><a class="sidebar-link" href="dashboard_animais.html"><i class="fa-solid fa-paw"></i> Animais</a></li>

<li><a class="sidebar-link" href="agenda.html"><i class="fa-solid fa-calendar"></i> Agenda</a></li>

<li><a class="sidebar-link" href="voluntarios.html"><i class="fa-solid fa-users"></i> Voluntários</a></li>

<li><a class="sidebar-link" href="doacoes.html"><i class="fa-solid fa-heart"></i> Doações</a></li>

<li><a class="sidebar-link" href="configuracoes.html"><i class="fa-solid fa-gear"></i> Configurações</a></li>
        </ul>
    </div>

    <div class="main">
        <div class="topbar">
            <h2>Animais</h2>
            <a class="back-link" href="dashboard.html">Voltar ao dashboard</a>
        </div>

        <div class="page-card">
            <h3>Adicionar animal</h3>
            <form id="animal-form" class="animal-form">
                <input type="text" id="animal-nome" placeholder="Nome do animal" required>
                <input type="text" id="animal-especie" placeholder="Espécie" required>
                <input type="number" id="animal-idade" placeholder="Idade" min="0" required>
                <input type="text" id="animal-raca" placeholder="Raça">
                <button type="submit">Salvar animal</button>
            </form>

            <h3 class="animals-title">Animais cadastrados</h3>
            <div id="lista-animais" class="animal-list"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('animal-form');
        const listaAnimais = document.getElementById('lista-animais');
        const storageKey = 'vetcare.animais';

        function carregarAnimais() {
            const dados = localStorage.getItem(storageKey);
            return dados ? JSON.parse(dados) : [];
        }

        function salvarAnimais(animais) {
            localStorage.setItem(storageKey, JSON.stringify(animais));
        }

        function renderizarAnimais() {
            const animais = carregarAnimais();

            if (animais.length === 0) {
                listaAnimais.innerHTML = '<p class="empty-state">Nenhum animal cadastrado ainda.</p>';
                return;
            }

            listaAnimais.innerHTML = animais.map((animal) => `
                <div class="animal-item">
                    <div>
                        <strong>${animal.nome}</strong>
                        <p>${animal.especie} • ${animal.raca || 'Sem raça'} • ${animal.idade} ano(s)</p>
                    </div>
                </div>
            `).join('');
        }

        form.addEventListener('submit', function (event) {
            event.preventDefault();

            const animal = {
                nome: document.getElementById('animal-nome').value.trim(),
                especie: document.getElementById('animal-especie').value.trim(),
                idade: document.getElementById('animal-idade').value.trim(),
                raca: document.getElementById('animal-raca').value.trim()
            };

            if (!animal.nome || !animal.especie || !animal.idade) {
                return;
            }

            const animais = carregarAnimais();
            animais.push(animal);
            salvarAnimais(animais);
            renderizarAnimais();
            form.reset();
        });

        renderizarAnimais();
    </script>
</body>
</html>
